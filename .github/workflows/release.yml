name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get npm token via OIDC
        run: |
          OIDC_RESPONSE=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm")
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "Failed to get OIDC token: $OIDC_RESPONSE"
            exit 1
          fi
          NPM_RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"oidc\",\"oidcToken\":\"$OIDC_TOKEN\"}" \
            https://registry.npmjs.org/-/npm/v1/security/oidc/token)
          NPM_TOKEN=$(echo "$NPM_RESPONSE" | jq -r '.token')
          if [ -z "$NPM_TOKEN" ] || [ "$NPM_TOKEN" = "null" ]; then
            echo "Failed to exchange OIDC token for npm token: $NPM_RESPONSE"
            exit 1
          fi
          echo "::add-mask::$NPM_TOKEN"
          echo "NODE_AUTH_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm run version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
